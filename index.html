<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Espejito Místico</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<h1>
✨ Espejito, espejito... <br>
tu reflejo revela mi divinidad ✨
</h1>

<div class="mirror-frame">

  <img src="Espejo.png" class="mirror-image">

  <div class="reflection">
    <img id="uploadedImage">
  </div> 

</div>

<div class="controls">

<input type="file" id="imageUpload" accept="image/*" hidden>
  
<p id="magicText">
    ✨ Tu reflejo revela tu divinidad ✨
</p>
  
<button class="magic-btn" onclick="document.getElementById('imageUpload').click()">
Sube tu imagen y descubre tu revelación
</button>

<button class="magic-btn" id="downloadBtn" style="display:none;">
💎 Descargar mi revelación 💎
</button>

</div>

<script>

const upload = document.getElementById('imageUpload');
const uploadedImage = document.getElementById('uploadedImage');
const downloadBtn = document.getElementById('downloadBtn');
const magicText = document.getElementById('magicText');

/* SUBIR IMAGEN */

upload.addEventListener('change', function(e){

const file = e.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

uploadedImage.src = event.target.result;

magicText.style.display = "block";
downloadBtn.style.display = "inline-block";

};

reader.readAsDataURL(file);

});


/* DESCARGAR */

downloadBtn.addEventListener('click', function(){

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

const frame = new Image();
frame.src = "Espejo.png";

frame.onload = function(){

const ratio = frame.height / frame.width;

canvas.width = 1000;
canvas.height = 1000 * ratio;

ctx.fillStyle = "#000";
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.drawImage(frame,0,0,canvas.width,canvas.height);

const user = new Image();
user.src = uploadedImage.src;

user.onload = function(){

const x = canvas.width * 0.145;
const y = canvas.height * 0.195;
const w = canvas.width * 0.7;
const h = canvas.height * 0.63;

ctx.save();

ctx.beginPath();

ctx.ellipse(
x + w/2,
y + h/2,
w/2,
h/2,
0,
0,
Math.PI * 2
);

ctx.clip();

/* cover */

const imgRatio = user.width / user.height;
const boxRatio = w / h;

let dw, dh, ox=0, oy=0;

if(imgRatio > boxRatio){
dh = h;
dw = h * imgRatio;
ox = (w - dw)/2;
}else{
dw = w;
dh = w / imgRatio;
oy = (h - dh)/2;
}

ctx.drawImage(user,x+ox,y+oy,dw,dh);

ctx.restore();

/* TEXTO REVELACION */

ctx.save();

ctx.font = "60px 'Great Vibes'";
ctx.textAlign = "center";
ctx.textBaseline = "bottom";

/* relleno dorado */
ctx.fillStyle = "#FFD700";

/* borde oscuro */
ctx.strokeStyle = "rgba(0,0,0,0.65)";
ctx.lineWidth = 6;

/* glow suave */
ctx.shadowColor = "rgba(0,0,0,0.45)";
ctx.shadowBlur = 18;
ctx.shadowOffsetX = 0;
ctx.shadowOffsetY = 2;

const text = "✨ Tu reflejo revela tu divinidad ✨";
const xText = canvas.width / 2;
const yText = canvas.height - 25;

/* borde primero */
ctx.strokeText(text, xText, yText);

/* relleno encima */
ctx.fillText(text, xText, yText);

ctx.restore();

/* DESCARGA */

const link=document.createElement("a");
link.download="mi-revelacion.png";
link.href=canvas.toDataURL();
link.click();

};

};

});

</script>

</body>
</html>
