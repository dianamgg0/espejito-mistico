<!-- Updated index.html to fix image positioning in the mirror -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espejo Mistico</title>
    <style>
        .reflection-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures better object-position alignment */
        }
    </style>
</head>
<body>
    <div class="reflection-container">
        <canvas id="mirrorCanvas"></canvas>
    </div>
    <script>
        // Canvas setup and drawing code to fit images properly inside the mirror frame
        const canvas = document.getElementById('mirrorCanvas');
        const ctx = canvas.getContext('2d');
        // Example drawing function (to be customized as needed)
        function drawImage(image) {
            ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
