<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Espejito Místico</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

<h1>
✨ Espejito, espejito... <br>
tu reflejo revela mi divinidad ✨
</h1>

<div class="mirror-frame">

  <img src="Espejo.png" class="mirror-image">

  <div class="reflection">
    <img id="uploadedImage">
  </div>

  <p id="magicText">
    ✨ Tu reflejo revela tu divinidad ✨
  </p>

</div>

<div class="controls">

<input type="file" id="imageUpload" accept="image/*" hidden>

<button class="magic-btn" onclick="imageUpload.click()">
✨ Sube tu imagen y descubre tu revelación ✨
</button>

<button class="magic-btn" id="downloadBtn">
💎 Descargar mi revelación 💎
</button>

</div>

</body>
</html>
